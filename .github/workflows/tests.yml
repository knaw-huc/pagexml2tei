name: tests

on: [ push,pull_request ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: (1/3) Checkout the repository
        uses: actions/checkout@v4

      - name: (2/3) Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: (3/3) Run tests
        run: make test
